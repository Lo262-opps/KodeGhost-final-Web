<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kodeghost</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">👻 Kodeghost</div>
  <div class="nav-icons">
    <span>❓</span>
    <span>👤</span>
    <span>🛒</span>
  </div>
</header>

<!-- SEARCH -->
<div class="search-container">
  <input type="text" placeholder="Search services...">
  <button>🔍</button>
</div>

<!-- HERO BANNER -->
<section class="hero">
  <div class="overlay">
    <h1>Digital Power by Kodeghost</h1>
    <p>Automation • Growth • Creative Tech</p>
  </div>
</section>

<!-- PROMO CARDS -->
<section class="cards">
  <div class="card">⚡ Fast Delivery</div>
  <div class="card">🔒 Secure Systems</div>
  <div class="card">🚀 Smart Solutions</div>
</section>

<!-- INTERACTIVE SECTION -->
<section class="interactive">
  <h2>What do you need today?</h2>

  <div class="buttons">
    <button onclick="showService('bots')">🤖 Bots</button>
    <button onclick="showService('growth')">📱 Growth</button>
    <button onclick="showService('design')">🎨 Design</button>
    <button onclick="showService('video')">🎬 Videos</button>
  </div>
</section>

<!-- RESULT DISPLAY -->
<section id="resultBox" class="result-box"></section>

<!-- WHATSAPP FLOAT -->
<a href="https://wa.me/263XXXXXXXXX" class="whatsapp">💬</a>

<script src="script.js"></script>
</body>
</html>
